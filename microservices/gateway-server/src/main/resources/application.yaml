spring:
    application:
        name: gateway-server
    cloud:
        gateway:
            server:
                webmvc:
                    routes:
                        - id: user-service
                          uri: lb://user-service
                          predicates:
                            - Path=/api/users/**
               
server:
    port: 8888

eureka:
    client:
        service-url:
            defaultZone: http://localhost:8761/eureka/
        fetch-registry: true
        register-with-eureka: true

